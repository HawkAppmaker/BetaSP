<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shatterpoint | Warp Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; touch-action: none; font-family: sans-serif; color: white; }
        canvas { display: block; }
        .ui-element { transition: opacity 0.5s; pointer-events: none; }
    </style>
</head>
<body>

    <div id="intro-overlay" class="absolute inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-8 text-center">
        <div class="max-w-md">
            <h1 class="text-teal-400 font-black text-6xl mb-4 italic uppercase tracking-tighter">Shatterpoint</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mb-12">Neural Warp Protocol</p>
            <button onclick="startApp()" class="px-16 py-6 bg-teal-500 text-slate-950 font-black rounded-2xl active:scale-95 transition-all uppercase tracking-widest text-sm shadow-2xl shadow-teal-500/20">
                Enter Flow State
            </button>
        </div>
    </div>

    <div class="ui-element absolute top-10 w-full flex justify-between px-10 z-20 opacity-40">
        <div id="timer-display" class="text-teal-400 font-mono text-3xl tracking-tighter">02:00</div>
        <div id="status" class="text-slate-400 font-bold text-xs uppercase tracking-[0.3em]">Lvl 1</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let fragments = [], glitches = [], stars = [], isPaused = true;
        let centralPulse = 1.0, pulseGlow = 0, timeLeft = 120;
        let level = 1, totalShattered = 0;

        // 1. Initialize Warp Starfield
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width - canvas.width/2,
                y: Math.random() * canvas.height - canvas.height/2,
                z: Math.random() * canvas.width,
                size: Math.random() * 2
            });
        }

        function startApp() {
            document.getElementById('intro-overlay').style.display = 'none';
            isPaused = false;
            setInterval(() => { if(timeLeft > 0) timeLeft--; updateHUD(); }, 1000);
        }

        function updateHUD() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('status').innerText = `Lvl ${level}`;
        }

        class Fragment {
            constructor(x, y, tx, ty) {
                this.x = x; this.y = y; this.tx = tx; this.ty = ty;
                this.vx = (Math.random() - 0.5) * 40;
                this.vy = (Math.random() - 0.5) * 40;
                this.isHome = false; this.counted = false;
            }
            update() {
                if (!this.isHome) {
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= 0.88; this.vy *= 0.88;
                    if (Math.abs(this.vx) < 1) {
                        this.x += (this.tx - this.x) * 0.12;
                        this.y += (this.ty - this.y) * 0.12;
                    }
                    if (Math.abs(this.x - this.tx) < 2) this.isHome = true;
                }
            }
            draw() {
                ctx.fillStyle = "#2dd4bf";
                ctx.fillRect(this.x, this.y, 2, 2);
            }
        }

        class Glitch {
            constructor() {
                const angle = Math.random() * Math.PI * 2;
                this.x = canvas.width/2 + Math.cos(angle) * canvas.width;
                this.y = canvas.height/2 + Math.sin(angle) * canvas.width;
                this.speed = 2 + (level * 0.4);
            }
            update() {
                const dx = (canvas.width/2) - this.x;
                const dy = (canvas.height/2) - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                this.x += (dx/dist) * this.speed;
                this.y += (dy/dist) * this.speed;
                return dist;
            }
            draw() {
                ctx.strokeStyle = '#f43f5e';
                ctx.strokeRect(this.x - 8, this.y - 8, 16, 16);
            }
        }

        function drawBackground() {
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width/2; const cy = canvas.height/2;
            
            stars.forEach(s => {
                s.z -= (1 + (centralPulse - 1) * 60); // Stars react to pulse
                if (s.z <= 0) s.z = canvas.width;
                const sx = (s.x * (canvas.width / s.z)) + cx;
                const sy = (s.y * (canvas.width / s.z)) + cy;
                const size = s.size * (canvas.width / s.z);
                ctx.fillStyle = `rgba(45, 212, 191, ${1 - s.z / canvas.width})`;
                ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI * 2); ctx.fill();
            });
        }

        function drawLogo(scale, glow) {
            const cx = canvas.width/2; const cy = canvas.height/2;
            const size = 50 * scale;
            ctx.shadowBlur = glow; ctx.shadowColor = "#2dd4bf";
            ctx.strokeStyle = "#2dd4bf"; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, cy - size); ctx.lineTo(cx + size, cy + size); ctx.lineTo(cx - size, cy + size);
            ctx.closePath(); ctx.stroke(); ctx.shadowBlur = 0;
        }

        function animate() {
            if (!isPaused) {
                drawBackground();
                centralPulse += ( (1 + Math.sin(Date.now() / 600) * 0.02) - centralPulse) * 0.1;
                pulseGlow *= 0.94;
                drawLogo(centralPulse, pulseGlow);

                fragments.forEach(f => {
                    f.update(); f.draw();
                    if (f.isHome && !f.counted) { centralPulse += 0.01; pulseGlow = 20; f.counted = true; }
                });

                if (Math.random() < 0.025) glitches.push(new Glitch());
                glitches.forEach((g, i) => {
                    const d = g.update(); g.draw();
                    if (d < 50) { glitches.splice(i, 1); centralPulse = 0.7; }
                });
            }
            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            if (isPaused) return;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            glitches.forEach((g, i) => {
                if (Math.sqrt((x-g.x)**2 + (y-g.y)**2) < 50) {
                    glitches.splice(i, 1); totalShattered++;
                    for(let j=0; j<20; j++) {
                        const tx = canvas.width/2 + (Math.random() - 0.5) * 60;
                        const ty = canvas.height/2 + (Math.random() - 0.5) * 60;
                        fragments.push(new Fragment(g.x, g.y, tx, ty));
                    }
                    if (totalShattered % 10 === 0) level++;
                }
            });
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
        animate();
    </script>
</body>
</html>
